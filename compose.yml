## AltivecIntelligence: Cross-Compilation & AI Assistant
# This compose file sets up the development environment.
#
# Usage:
# Build Images:      docker compose build
# Use With AI:       docker compose run --rm altivec-intelligence
# Use W/out AI:      docker compose run --rm altivec
# Build Example App: docker compose run --rm altivec "cd apps/SingleWindow && make all"

services:
  altivec-intelligence:
    build:
      context: .
      dockerfile: Containerfile
      target: altivec-base
    image: altivec-intelligence-image
    environment:
      - FORCE_COLOR=1
    working_dir: /repo/altivec
    volumes:
      - .:/repo/altivec
      - ~/.gemini:/root/.gemini
    stdin_open: true
    tty: true
    entrypoint:
      - /bin/bash
      - -c
      - |
        npm install -g @google/gemini-cli && \
        gemini --yolo

  altivec:
    build:
      context: .
      dockerfile: Containerfile
      target: altivec-base
    image: altivec-base-image
    working_dir: /repo/altivec
    volumes:
      - .:/repo/altivec
    stdin_open: true
    tty: true
