# AltivecIntelligence: Parent Project Setup
# Use this file to "activate" the Altivec toolchain in your new repository.
#
# 1. Add Altivec as a submodule:
#    git submodule add https://github.com/jeffreybergier/AltivecIntelligence.git altivec
#
# 2. Copy this file to your project root:
#    cp altivec/altivec_compose.yml ./compose.yml
#
# 3. Build docker images (one time):
#    docker compose build
#
# 4. Build an example app from the Altivec submodule:
#    docker compose run --rm altivec "cd /repo/altivec/apps/SingleWindow && make"
#
# 5a. Use with Gemini CLI (AI Assistant):
#    docker compose run --rm altivec-gemini
#
# 5b. Use with Claude Code (AI Assistant):
#    docker compose run --rm altivec-claude
#
# 5c. Use with standard shell (no AI):
#    docker compose run --rm altivec
#

services:
  altivec-gemini:
    extends:
      file: ./altivec/compose.yml
      service: altivec-gemini
    volumes:
      - .:/repo/user
      # Uncomment the following line to allow the AI to use your local SSH keys 
      # for deploying applications to your vintage Macs and iPhones.
      # The :ro flag ensures the container cannot modify your host keys.
      # - ~/.ssh:/root/.ssh:ro
    working_dir: /repo/user

  altivec-claude:
    extends:
      file: ./altivec/compose.yml
      service: altivec-claude
    volumes:
      - .:/repo/user
      # Uncomment the following line to allow the AI to use your local SSH keys 
      # for deploying applications to your vintage Macs and iPhones.
      # The :ro flag ensures the container cannot modify your host keys.
      # - ~/.ssh:/root/.ssh:ro
    working_dir: /repo/user

  altivec:
    extends:
      file: ./altivec/compose.yml
      service: altivec
    volumes:
      - .:/repo/user
    working_dir: /repo/user
