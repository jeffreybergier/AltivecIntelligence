name: Build Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/altivec-intelligence

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and commit
        id: release
        run: |
          git fetch --force origin main
          git fetch --force --tags

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Unsupported ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi

          tag="${GITHUB_REF_NAME}"
          sha="$(git rev-list -n 1 "$tag")"
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "Tag $tag ($sha) is not reachable from origin/main." >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$sha" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build GHCR image
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          target: ghcr-action
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: release-digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    name: Publish GHCR manifest
    needs:
      - prepare
      - build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: release-digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          sources=()
          for digest in *; do
            sources+=("${{ env.IMAGE }}@sha256:${digest}")
          done
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ needs.prepare.outputs.release_sha }} \
            -t ${{ env.IMAGE }}:${{ needs.prepare.outputs.release_tag }} \
            "${sources[@]}"

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ needs.prepare.outputs.release_tag }}

  release-assets:
    name: Build and stage release packages
    needs:
      - prepare
      - merge-image
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read
    env:
      BUILD_IMAGE: ghcr.io/${{ github.repository_owner }}/altivec-intelligence:${{ needs.prepare.outputs.release_tag }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      RELEASE_SHA: ${{ needs.prepare.outputs.release_sha }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}
          submodules: recursive

      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: |
            libs/libcurl/tarballs
            libs/sqlite/tarballs
          key: release-source-tarballs-${{ runner.os }}-${{ hashFiles('libs/libcurl/Makefile*', 'libs/libcurl/libcurl_common.mk', 'libs/sqlite/Makefile*', 'libs/sqlite/sqlite_common.mk') }}
          restore-keys: |
            release-source-tarballs-${{ runner.os }}-

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check configured versions
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -v "${{ github.workspace }}:/repo/user" \
            -w /repo/user \
            "$BUILD_IMAGE" \
            -lc "altivec-release ci-env '$RELEASE_TAG'" > release.env
          cat release.env >> "$GITHUB_ENV"
          cat release.env

      - name: Build configured targets and stage assets
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            -e IS_SANDBOX=1 \
            -e ALTIVEC_RELEASE_PREBUILT_ROOT=/altivec \
            -v "${{ github.workspace }}:/repo/user" \
            -w /repo/user \
            "$BUILD_IMAGE" \
            -lc "altivec-release build && altivec-release stage '$RELEASE_VERSION'"
          ls -lh dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$RELEASE_SHA" \
              --generate-notes
          fi
          gh release upload "$RELEASE_TAG" dist/* --clobber
