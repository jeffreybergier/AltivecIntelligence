name: Publish Docker Image to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'altivec_build/**'
      - 'libs/libcurl/**'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/altivec-intelligence

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build base image (OSXCross + GCC)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          target: altivec-base
          load: true
          tags: altivec-base:local
          cache-from: type=gha,scope=altivec-base
          cache-to: type=gha,scope=altivec-base,mode=max

      - name: Build libcurl on top of base image
        run: |
          cat > Dockerfile.libcurl << 'EOF'
          FROM altivec-base:local
          WORKDIR /repo/altivec
          COPY libs/libcurl/ ./libs/libcurl/
          RUN cd libs/libcurl && make all
          EOF
          docker build -f Dockerfile.libcurl \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
