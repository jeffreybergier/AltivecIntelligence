## AltivecIntelligence: Parent Project Setup
# Use this file to "activate" the Altivec toolchain in your new repository.
#
# Usage:
# 1. Add Altivec as a submodule:
#    git submodule add https://github.com/jeffreybergier/AltivecIntelligence.git altivec
#
# 2. Copy this file to your project root:
#    cp altivec/templates/compose.yml ./compose.yml
#
# 3. Build docker images (one time):
#    docker compose build
#
# 4. Build an example app from the Altivec submodule:
#    docker compose run --rm altivec "cd /repo/user/altivec/apps/SingleWindow && make"
#
# 5. Use with AI Assistant:
#    docker compose run --rm altivec-intelligence
#
#    Preinstalled AI CLI's:
#    - Claude Code
#    - Codex
#    - Antigravity
#    - Pi
#    - OpenCode
#
#    An interactive chooser prompts you to pick one.
#

services:
  altivec-intelligence:
    extends:
      file: ./altivec/compose.yml
      service: altivec-intelligence
    volumes:
      - .:/repo/user
    working_dir: /repo/user

  altivec:
    extends:
      file: ./altivec/compose.yml
      service: altivec
    volumes:
      - .:/repo/user
    working_dir: /repo/user
